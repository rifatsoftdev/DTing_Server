<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTing - Reset Password</title>

    <link rel="icon" type="image/x-icon" href="/static/image/logo.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(circle at top left, #6366f1 0%, transparent 40%),
                radial-gradient(circle at bottom right, #8b5cf6 0%, transparent 40%),
                #f4f7fb;
            font-family: Inter, sans-serif;
            padding: 20px;
        }

        .reset-card {
            width: 100%;
            max-width: 430px;
            border: none;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            box-shadow:
                0 10px 30px rgba(0, 0, 0, .08),
                0 2px 8px rgba(99, 102, 241, .15);
            overflow: hidden;
            animation: fadeUp .5s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-body {
            padding: 40px 32px;
        }

        .logo-wrapper {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
            color: white;
            font-size: 28px;
            margin-bottom: 18px;
        }

        h2 {
            font-weight: 700;
            color: #111827;
        }

        .subtitle {
            color: #6b7280;
            font-size: .95rem;
        }

        .form-control {
            border-radius: 14px;
            height: 56px;
            border: 1px solid #dbe1ea;
        }

        .form-control:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 .25rem rgba(99, 102, 241, .15);
        }

        .password-group {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #6b7280;
        }

        .btn-reset {
            height: 55px;
            border-radius: 14px;
            font-weight: 600;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
        }

        #message {
            margin-top: 15px;
        }

        .security-note {
            font-size: .85rem;
            color: #6b7280;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="card reset-card">
        <div class="card-body">

            <div class="logo-wrapper">
                <img src="/static/image/logo.png"
                    alt="PocketPay"
                    style="width:40px;height:40px;">
            </div>

            <h2 class="text-center mb-2">Reset Password</h2>

            <p class="subtitle text-center mb-4">
                Create a strong password to secure your DTing account.
            </p>

            <form id="resetForm">

                <input type="hidden" name="password_token" value="{{ password_token }}">

                <div class="mb-3 password-group">
                    <input type="password"
                        class="form-control"
                        id="new_password"
                        placeholder="New Password"
                        required>

                    <button type="button"
                        class="toggle-password"
                        onclick="togglePassword('new_password', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>

                <div class="mb-3 password-group">
                    <input type="password"
                        class="form-control"
                        id="confirm_password"
                        placeholder="Confirm Password"
                        required>

                    <button type="button"
                        class="toggle-password"
                        onclick="togglePassword('confirm_password', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>

                <button type="submit"
                    id="submitBtn"
                    class="btn btn-primary btn-reset w-100">

                    Reset Password
                </button>

            </form>

            <div id="message"></div>

            <div class="security-note">
                <i class="bi bi-shield-lock"></i>
                Your password is encrypted and securely stored.
            </div>

        </div>
    </div>

    <script>
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector("i");

            if (input.type === "password") {
                input.type = "text";
                icon.className = "bi bi-eye-slash";
            } else {
                input.type = "password";
                icon.className = "bi bi-eye";
            }
        }

        const form = document.getElementById("resetForm");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById("submitBtn");
            const message = document.getElementById("message");

            const password_token = form.password_token.value;
            const new_password =
                document.getElementById("new_password").value;

            const confirm_password =
                document.getElementById("confirm_password").value;

            if (new_password !== confirm_password) {
                message.innerHTML =
                    `<div class="alert alert-danger">Passwords do not match.</div>`;
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML =
                `<span class="spinner-border spinner-border-sm"></span> Processing...`;

            try {
                const res = await fetch("/auth/set-password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        password_token,
                        new_password
                    }),
                });

                const data = await res.json();

                if (data.success) {
                    message.innerHTML =
                        `<div class="alert alert-success">${data.message}</div>`;
                    form.reset();
                } else {
                    message.innerHTML =
                        `<div class="alert alert-danger">${data.message || data.detail}</div>`;
                }

            } catch {
                message.innerHTML =
                    `<div class="alert alert-danger">Server connection failed.</div>`;
            }

            submitBtn.disabled = false;
            submitBtn.innerHTML = "Reset Password";
        });
    </script>

</body>

</html>
