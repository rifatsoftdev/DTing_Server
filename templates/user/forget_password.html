<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTing — Reset Password</title>
    <link rel="icon" type="image/x-icon" href="/static/image/logo.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-0: #06080f;
            --bg-1: #0a1324;
            --card: rgba(10, 16, 28, 0.82);
            --card-border: rgba(255, 255, 255, 0.14);
            --text: #e6edf7;
            --muted: #94a3b8;
            --line: rgba(148, 163, 184, 0.28);
            --accent: #30b8ff;
            --accent-2: #13d8c4;
            --input-bg: rgba(14, 23, 39, 0.88);
            --gradient-primary: linear-gradient(95deg, #009de0, #0cc9ba);
            --gradient-hover: linear-gradient(95deg, #00b4e6, #26d0c0);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Manrope", "Segoe UI", system-ui, sans-serif;
            color: var(--text);
            background:
                radial-gradient(70rem 40rem at 10% 8%, rgba(48, 184, 255, 0.22), transparent 58%),
                radial-gradient(52rem 35rem at 93% 90%, rgba(19, 216, 196, 0.2), transparent 62%),
                linear-gradient(145deg, var(--bg-0), var(--bg-1));
            padding: 24px;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            z-index: 0;
            border-radius: 50%;
            filter: blur(65px);
            pointer-events: none;
        }

        body::before {
            width: 260px;
            height: 260px;
            top: -70px;
            right: 8%;
            background: rgba(48, 184, 255, 0.18);
        }

        body::after {
            width: 240px;
            height: 240px;
            bottom: -60px;
            left: 9%;
            background: rgba(19, 216, 196, 0.14);
        }

        .auth-wrapper {
            width: 100%;
            max-width: 455px;
            position: relative;
            z-index: 1;
        }

        .auth-card {
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015)) var(--card);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            padding: 2.45rem 2.1rem;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
            animation: fadeUp 0.55s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            box-shadow: 0 14px 34px rgba(48, 184, 255, 0.25);
        }

        .icon-box i {
            color: #fff;
            font-size: 1.55rem;
        }

        .brand {
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-align: center;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-wrapper {
            width: 100%;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-wrapper img {
            height: 80px;
            width: 80px;
        }

        .title {
            font-size: 1.55rem;
            font-weight: 800;
            margin-bottom: 0.35rem;
            text-align: center;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-control {
            border-radius: 14px;
            padding: 0.9rem 1rem;
            font-size: 1rem;
            color: var(--text);
            border: 1px solid var(--line);
            background: var(--input-bg);
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-control::placeholder {
            color: #7f8da3;
        }

        .form-control:focus {
            color: var(--text);
            background: var(--input-bg);
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(48, 184, 255, 0.2), 0 4px 16px rgba(48, 184, 255, 0.15);
        }

        .btn-primary {
            background: var(--gradient-primary);
            border: none;
            border-radius: 14px;
            padding: 0.82rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0, 157, 224, 0.3);
        }

        .btn-primary::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 157, 224, 0.4);
            background: var(--gradient-hover);
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.8rem;
            font-size: 0.9rem;
            color: #85daff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #b5ebff;
        }

        .alert {
            border-radius: 12px;
            font-size: 0.9rem;
            padding: 0.75rem 1rem;
        }

        .alert-danger {
            background: rgba(255, 107, 107, 0.14);
            border-color: rgba(255, 107, 107, 0.45);
            color: #ffc7c7;
        }

        .alert-success {
            background: rgba(19, 216, 196, 0.16);
            border-color: rgba(19, 216, 196, 0.52);
            color: #bdfff8;
        }

        .invalid-feedback {
            color: #ffc7c7;
        }

        @media (max-width: 576px) {
            body {
                align-items: flex-start;
                padding: 16px;
            }

            .auth-card {
                padding: 1.9rem 1.2rem;
                border-radius: 20px;
            }

            .brand,
            .title {
                font-size: 1.85rem;
            }
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="brand mb-3">DTing</div>

        <div class="logo-wrapper">
            <img src="/static/image/logo.png" alt="DTing Logo">
        </div>

        <div class="title">Forgot your password?</div>
        <div class="subtitle">
            Enter your email and we’ll send you a reset link.
        </div>

        <form id="forgot-form" class="needs-validation" novalidate>
            <div class="mb-4">
                <input type="email" name="email" class="form-control" placeholder="Email address" required autofocus>
                <div class="invalid-feedback">Please enter a valid email.</div>
            </div>

            <div id="error-message" class="alert alert-danger d-none"></div>
            <div id="success-message" class="alert alert-success d-none"></div>

            <button type="submit" class="btn btn-primary w-100">
                Send Reset Link
            </button>
        </form>

        <a href="/login" class="back-link">
            ← Back to Sign In
        </a>

    </div>
</div>

<script type="module">
    import { get_device_id, get_device_uuid } from '/static/js/utils.js';

    const form = document.getElementById("forgot-form");
    const errorBox = document.getElementById("error-message");
    const successBox = document.getElementById("success-message");
    const submitBtn = form.querySelector("button[type=submit]");

    function setError(message) {
        successBox.classList.add("d-none");
        if (!message) {
            errorBox.classList.add("d-none");
            errorBox.textContent = "";
            return;
        }
        errorBox.textContent = message;
        errorBox.classList.remove("d-none");
    }

    function setSuccess(message) {
        errorBox.classList.add("d-none");
        errorBox.textContent = "";
        if (!message) {
            successBox.classList.add("d-none");
            successBox.textContent = "";
            return;
        }
        successBox.textContent = message;
        successBox.classList.remove("d-none");
    }

    function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        submitBtn.textContent = isLoading ? "Sending..." : "Send Reset Link";
    }

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        setError("");
        setSuccess("");

        if (!form.checkValidity()) {
            form.classList.add("was-validated");
            return;
        }

        const formData = new FormData(form);
        const email = (formData.get("email") || "").toString().trim();
        const device_id = get_device_id();
        const device_uuid = await get_device_uuid();

        setLoading(true);
        try {
            const res = await fetch(`${window.location.origin}/auth/reset-password`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email_address: email,
                    device_id,
                    device_uuid
                })
            });

            const data = await res.json();

            if (res.ok && data.success) {
                setSuccess(data.message || "Password reset link sent successfully");
                form.reset();
                form.classList.remove("was-validated");
            } else {
                setError(data.message || data.detail || "Failed to send reset link");
            }
        } catch (err) {
            setError(err.message || "Network error. Please try again.");
        } finally {
            setLoading(false);
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
