<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTing — OTP Verification</title>
    <link rel="icon" type="image/x-icon" href="/static/image/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background:
                radial-gradient(70rem 40rem at 10% 8%, rgba(48, 184, 255, 0.22), transparent 58%),
                radial-gradient(52rem 35rem at 93% 90%, rgba(19, 216, 196, 0.2), transparent 62%),
                linear-gradient(145deg, #06080f, #0a1324);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Manrope", "Segoe UI", system-ui, sans-serif;
            padding: 24px;
        }
        .verify-wrapper {
            max-width: 480px;
            width: 90%;
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015)) rgba(10, 16, 28, 0.82);
            backdrop-filter: blur(24px);
            border-radius: 1.75rem;
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
            padding: 2.5rem 2rem;
        }
        .verify-wrapper h2 {
            font-weight: 700;
            background: linear-gradient(90deg, #30b8ff, #13d8c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            margin-bottom: 0.75rem;
            text-align: center;
        }
        .verify-wrapper p {
            color: #c7d6ea;
            font-size: 1rem;
            margin-bottom: 1.4rem;
            text-align: center;
        }
        .btn-primary {
            background: linear-gradient(95deg, #009de0, #0cc9ba);
            border: none;
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 26px rgba(0, 157, 224, 0.35);
        }
        .form-control {
            border-radius: 14px;
            padding: 0.9rem 1rem;
            font-size: 1rem;
            color: #e6edf7;
            border: 1px solid rgba(148, 163, 184, 0.28);
            background: rgba(14, 23, 39, 0.88);
        }
        .form-control:focus {
            color: #e6edf7;
            border-color: #30b8ff;
            background: rgba(14, 23, 39, 0.88);
            box-shadow: 0 0 0 0.2rem rgba(48, 184, 255, 0.2);
        }
        .meta {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        .resend-link {
            color: #85daff;
            text-decoration: none;
            font-weight: 500;
        }
        .resend-link:hover {
            text-decoration: underline;
        }
        .alert {
            border-radius: 12px;
        }
        .alert-danger {
            background: rgba(255, 107, 107, 0.14);
            border-color: rgba(255, 107, 107, 0.45);
            color: #ffc7c7;
        }
        .alert-success {
            background: rgba(19, 216, 196, 0.16);
            border-color: rgba(19, 216, 196, 0.52);
            color: #bdfff8;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="verify-wrapper">
    <h2>Verify OTP</h2>
    <p>Enter the code sent to your email/phone to continue.</p>
    <div id="deliverToText" class="meta"></div>

    <form id="otp-form" novalidate>
        <div class="mb-3">
            <input
                id="otpInput"
                name="otp"
                type="text"
                class="form-control"
                placeholder="Enter OTP"
                maxlength="6"
                minlength="4"
                required
            >
        </div>

        <div id="error-message" class="alert alert-danger d-none"></div>
        <div id="success-message" class="alert alert-success d-none"></div>

        <button id="verify-btn" type="submit" class="btn btn-primary w-100 mb-3">Verify OTP</button>
    </form>

    <p class="mb-0 text-center">Didn't receive OTP? <a href="#" id="resendOtpLink" class="resend-link">Resend OTP</a></p>
</div>

<script src="/static/js/utils.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/dialog.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode") || "";
    const userId = params.get("user_id") || "";
    const method = params.get("method") || "email";
    const deleverTo = params.get("delever_to") || "";
    let otpToken = params.get("otp_token") || "";
    let emailVerificationToken = params.get("email_verification_token") || "";

    const otpForm = document.getElementById("otp-form");
    const otpInput = document.getElementById("otpInput");
    const verifyBtn = document.getElementById("verify-btn");
    const resendOtpLink = document.getElementById("resendOtpLink");
    const deliverToText = document.getElementById("deliverToText");
    const errorBox = document.getElementById("error-message");
    const successBox = document.getElementById("success-message");

    function showError(message) {
        successBox.classList.add("d-none");
        successBox.textContent = "";
        errorBox.textContent = message;
        errorBox.classList.remove("d-none");
    }

    function showSuccess(message) {
        errorBox.classList.add("d-none");
        errorBox.textContent = "";
        successBox.textContent = message;
        successBox.classList.remove("d-none");
    }

    function setVerifyLoading(isLoading) {
        verifyBtn.disabled = isLoading;
        verifyBtn.textContent = isLoading ? "Verifying..." : "Verify OTP";
    }

    if (!deleverTo || (!otpToken && !emailVerificationToken)) {
        showError("Verification data missing. Please register again.");
    } else {
        deliverToText.textContent = `OTP sent to: ${deleverTo}`;
    }

    otpForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorBox.classList.add("d-none");
        successBox.classList.add("d-none");

        if (!otpForm.checkValidity()) {
            otpForm.classList.add("was-validated");
            return;
        }

        if (!deleverTo || (!otpToken && !emailVerificationToken)) {
            showError("Verification data missing. Please register again.");
            return;
        }

        setVerifyLoading(true);
        try {
            const result = mode === "new_user_email"
                ? await verifyNewUserEmail({
                    user_id: userId,
                    otp: otpInput.value.trim(),
                    email_verification_token: emailVerificationToken
                })
                : await verifyOTP({
                    method,
                    delever_to: deleverTo,
                    otp: otpInput.value.trim(),
                    otp_token: otpToken
                });

            const data = result?.data || {};
            persistAuthSession({
                user_id: data.user_id,
                access_token: data.access_token,
                refresh_token: data.refresh_token
            });

            const message = result?.message || "OTP verified successfully.";
            showSuccess(message);
            if (window.DTDialog && typeof window.DTDialog.success === "function") {
                window.DTDialog.success(message, { autoClose: 1400 });
            }

            setTimeout(() => {
                window.location.href = "/account";
            }, 900);
        } catch (error) {
            const message = error?.message || "OTP verification failed.";
            showError(message);
            if (window.DTDialog && typeof window.DTDialog.error === "function") {
                window.DTDialog.error(message);
            }
        } finally {
            setVerifyLoading(false);
        }
    });

    resendOtpLink.addEventListener("click", async (e) => {
        e.preventDefault();
        errorBox.classList.add("d-none");
        successBox.classList.add("d-none");

        if (!deleverTo) {
            showError("Email/phone is missing.");
            return;
        }

        resendOtpLink.style.pointerEvents = "none";
        resendOtpLink.textContent = "Sending...";
        try {
            const result = mode === "new_user_email"
                ? await resendNewUserEmailVerification({
                    email_verification_token: emailVerificationToken
                })
                : await sendOTP({
                    method,
                    delever_to: deleverTo
                });
            otpToken = result?.data?.otp_token || otpToken;
            emailVerificationToken = result?.data?.email_verification_token || emailVerificationToken;
            showSuccess("A new OTP has been sent.");
        } catch (error) {
            showError(error?.message || "Failed to resend OTP.");
        } finally {
            resendOtpLink.style.pointerEvents = "";
            resendOtpLink.textContent = "Resend OTP";
        }
    });
</script>
</body>
</html>
