<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTing — My Account</title>
    <link rel="icon" type="image/x-icon" href="/static/image/logo.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-0: #06080f;
            --bg-1: #0a1324;
            --card: rgba(10, 16, 28, 0.82);
            --card-border: rgba(255, 255, 255, 0.14);
            --text: #e6edf7;
            --muted: #94a3b8;
            --line: rgba(148, 163, 184, 0.28);
            --accent: #30b8ff;
            --accent-2: #13d8c4;
            --input-bg: rgba(14, 23, 39, 0.88);
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Manrope", "Segoe UI", system-ui, sans-serif;
            color: var(--text);
            background:
                radial-gradient(70rem 40rem at 10% 8%, rgba(48, 184, 255, 0.22), transparent 58%),
                radial-gradient(52rem 35rem at 93% 90%, rgba(19, 216, 196, 0.2), transparent 62%),
                linear-gradient(145deg, var(--bg-0), var(--bg-1));
            padding: 24px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 1;
        }

        .auth-card {
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015)) var(--card);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            padding: 2.45rem 2.1rem;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
        }

        .brand {
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-align: center;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--gradient-primary, linear-gradient(95deg, #009de0, #0cc9ba));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: white;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .field-label {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 0.25rem;
        }

        .field-value {
            font-size: 1rem;
            color: var(--text);
            padding: 0.75rem 1rem;
            background: var(--input-bg);
            border-radius: 12px;
            border: 1px solid var(--line);
            margin-bottom: 1rem;
        }

        .btn-primary {
            background: linear-gradient(95deg, #009de0, #0cc9ba);
            border: none;
            border-radius: 14px;
            padding: 0.82rem;
            font-weight: 700;
            font-size: 1rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 26px rgba(0, 157, 224, 0.35);
        }

        .alert {
            border-radius: 12px;
        }

        .alert-danger {
            background: rgba(255, 107, 107, 0.14);
            border-color: rgba(255, 107, 107, 0.45);
            color: #ffc7c7;
        }

        @media (max-width: 576px) {
            body {
                align-items: flex-start;
                padding: 16px;
            }

            .auth-card {
                padding: 1.9rem 1.2rem;
                border-radius: 20px;
            }

            .brand {
                font-size: 1.85rem;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="mb-4">
                <div class="brand">DTing</div>
            </div>

            <div id="loading" class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 text-muted">Loading account...</p>
            </div>

            <div id="account-content" class="d-none">
                <div class="profile-header">
                    <div class="avatar" id="avatar">
                        <span id="avatar-initials">U</span>
                    </div>
                    <div>
                        <h4 class="mb-1" id="user-name">Loading...</h4>
                        <p class="mb-0 text-muted" id="user-email">Loading...</p>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <div class="field-label">Phone Number</div>
                        <div class="field-value" id="phone-number">-</div>
                    </div>
                    <div class="col-md-6">
                        <div class="field-label">Country Code</div>
                        <div class="field-value" id="country-code">-</div>
                    </div>
                    <div class="col-md-6">
                        <div class="field-label">Gender</div>
                        <div class="field-value" id="gender">-</div>
                    </div>
                    <div class="col-md-6">
                        <div class="field-label">Date of Birth</div>
                        <div class="field-value" id="dob">-</div>
                    </div>
                    <div class="col-md-6">
                        <div class="field-label">Email Verified</div>
                        <div class="field-value" id="email-verified">-</div>
                    </div>
                    <div class="col-md-6">
                        <div class="field-label">Phone Verified</div>
                        <div class="field-value" id="phone-verified">-</div>
                    </div>
                </div>

                <div id="error-message" class="alert alert-danger d-none mb-3"></div>

                <div class="d-flex gap-2">
                    <button class="btn btn-primary flex-fill" onclick="logout()">Logout</button>
                    <a href="/login" class="btn btn-outline-secondary flex-fill">Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            await loadAccount();
        });

        async function loadAccount() {
            let token = localStorage.getItem('token');
            const refreshToken = localStorage.getItem('refresh_token');
            
            if (!token) {
                showError('Not logged in. Redirecting to login...');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
                return;
            }

            try {
                const data = await fetchAccountData(token);
                if (data) {
                    displayAccount(data.profile);
                }
            } catch (error) {
                if (error.message === 'Session expired' && refreshToken) {
                    try {
                        await refreshTokenCall(refreshToken);
                        token = localStorage.getItem('token');
                        const data = await fetchAccountData(token);
                        if (data) {
                            displayAccount(data.profile);
                        }
                    } catch (refreshError) {
                        showError('Session expired. Please login again.');
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 2000);
                    }
                } else {
                    showError(error.message || 'Failed to load account');
                }
            }
        }

        async function fetchAccountData(token) {
            const response = await fetch(`${window.location.origin}/me`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                if (response.status === 401) {
                    throw new Error('Session expired');
                }
                throw new Error('Failed to load account data');
            }

            const data = await response.json();
            return data.data;
        }

        async function refreshTokenCall(refreshToken) {
            const userData = JSON.parse(localStorage.getItem('user') || '{}');
            const response = await fetch(`${window.location.origin}/auth/refresh-access-token`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    refresh_token: refreshToken,
                    user_id: userData.id,
                    device_id: userData.deviceId || 'web_device',
                    device_uuid: userData.deviceUuid || 'web_uuid'
                })
            });

            if (!response.ok) {
                localStorage.removeItem('token');
                localStorage.removeItem('refresh_token');
                throw new Error('Refresh failed');
            }

            const data = await response.json();
            if (data.data?.access_token) {
                localStorage.setItem('token', data.data.access_token);
            }
            if (data.data?.refresh_token) {
                localStorage.setItem('refresh_token', data.data.refresh_token);
            }
        }

        function displayAccount(profile) {
            if (!profile) return;

            document.getElementById('loading').classList.add('d-none');
            document.getElementById('account-content').classList.remove('d-none');

            const name = profile.full_name || profile.username || 'User';
            document.getElementById('user-name').textContent = name;
            document.getElementById('user-email').textContent = profile.email_address || '-';
            
            if (profile.profile_picture) {
                const avatarImg = document.createElement('img');
                avatarImg.src = profile.profile_picture;
                avatarImg.alt = name;
                document.getElementById('avatar').innerHTML = '';
                document.getElementById('avatar').appendChild(avatarImg);
            } else {
                document.getElementById('avatar-initials').textContent = name.charAt(0).toUpperCase();
            }

            document.getElementById('phone-number').textContent = profile.phone_number || '-';
            document.getElementById('country-code').textContent = profile.country_code || '-';
            document.getElementById('gender').textContent = profile.gender || '-';
            document.getElementById('dob').textContent = profile.date_of_birth || '-';
            document.getElementById('email-verified').textContent = profile.email_verified ? 'Yes' : 'No';
            document.getElementById('phone-verified').textContent = profile.phone_verified ? 'Yes' : 'No';
        }

        function showError(message) {
            document.getElementById('loading').classList.add('d-none');
            document.getElementById('account-content').classList.remove('d-none');
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-message').classList.remove('d-none');
        }

        async function logout() {
            const token = localStorage.getItem('token');
            
            try {
                if (token) {
                    const userData = JSON.parse(localStorage.getItem('user') || '{}');
                    await fetch(`${window.location.origin}/auth/logout`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            user_id: userData.id,
                            access_token: token,
                            device_id: userData.deviceId || 'web_device',
                            device_uuid: userData.deviceUuid || 'web_uuid'
                        })
                    });
                }
            } catch (e) {
                console.error('Logout error:', e);
            }

            localStorage.removeItem('token');
            localStorage.removeItem('refresh_token');
            sessionStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
