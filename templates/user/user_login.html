<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTing — Sign In</title>
    <link rel="icon" type="image/x-icon" href="/static/image/logo.png">
    
    <!-- Bootstrap 5.3.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6.5.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts: Manrope -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-0: #06080f;
            --bg-1: #0a1324;
            --card: rgba(10, 16, 28, 0.82);
            --card-border: rgba(255, 255, 255, 0.14);
            --text: #e6edf7;
            --muted: #94a3b8;
            --line: rgba(148, 163, 184, 0.28);
            --accent: #30b8ff;
            --accent-2: #13d8c4;
            --danger: #ff6b6b;
            --input-bg: rgba(14, 23, 39, 0.88);
            --gradient-primary: linear-gradient(95deg, #009de0, #0cc9ba);
            --gradient-hover: linear-gradient(95deg, #00b4e6, #26d0c0);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Manrope", "Segoe UI", system-ui, sans-serif;
            color: var(--text);
            background:
                radial-gradient(70rem 40rem at 10% 8%, rgba(48, 184, 255, 0.22), transparent 58%),
                radial-gradient(52rem 35rem at 93% 90%, rgba(19, 216, 196, 0.2), transparent 62%),
                linear-gradient(145deg, var(--bg-0), var(--bg-1));
            padding: 24px;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            z-index: 0;
            border-radius: 50%;
            filter: blur(65px);
            pointer-events: none;
        }

        body::before {
            width: 260px;
            height: 260px;
            top: -70px;
            right: 8%;
            background: rgba(48, 184, 255, 0.18);
        }

        body::after {
            width: 240px;
            height: 240px;
            bottom: -60px;
            left: 9%;
            background: rgba(19, 216, 196, 0.14);
        }

        .auth-wrapper {
            width: 100%;
            max-width: 455px;
            position: relative;
            z-index: 1;
        }

        .auth-card {
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015)) var(--card);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            padding: 2.45rem 2.1rem;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
            animation: fadeUp 0.55s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand {
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-align: center;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 2.2rem;
        }

        .nav-pills {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 4px;
            border: 1px solid var(--line);
            margin-bottom: 2rem;
        }

        .nav-pills .nav-link {
            border-radius: 10px;
            padding: 0.65rem 1.25rem;
            font-weight: 600;
            color: var(--muted);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-pills .nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
            border-radius: 10px;
        }

        .nav-pills .nav-link.active {
            color: white;
            box-shadow: 0 4px 12px rgba(48, 184, 255, 0.3);
        }

        .nav-pills .nav-link.active::before {
            opacity: 1;
        }

        .nav-pills .nav-link:not(.active):hover::before {
            opacity: 0.08;
        }

        .form-control {
            border-radius: 14px;
            padding: 0.9rem 1rem;
            font-size: 1rem;
            color: var(--text);
            border: 1px solid var(--line);
            background: var(--input-bg);
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-control::placeholder {
            color: #7f8da3;
        }

        .form-control:focus {
            color: var(--text);
            background: var(--input-bg);
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(48, 184, 255, 0.2), 0 4px 16px rgba(48, 184, 255, 0.15);
        }

        .input-group {
            position: relative;
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            transform: translateY(-2px);
        }

        .input-group:focus-within .input-group-text {
            border-color: var(--accent);
            color: #c5f0ff;
            background: rgba(48, 184, 255, 0.05);
        }

        .input-group:focus-within .form-control {
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(48, 184, 255, 0.2);
        }

        .form-select.country-select {
            border-radius: 14px;
            padding: 0.9rem 1rem;
            font-size: 1rem;
            color: var(--text);
            border: 1px solid var(--line);
            background: var(--input-bg);
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23ffffff' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M2 5l6 6 6-6'/%3e%3c/svg%3e");
            background-size: 1rem;
            background-position: right 1rem center;
            background-repeat: no-repeat;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-select.country-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(48, 184, 255, 0.2), 0 4px 16px rgba(48, 184, 255, 0.15);
        }

        .form-select.country-select:hover {
            border-color: rgba(48, 184, 255, 0.6);
            box-shadow: 0 4px 12px rgba(48, 184, 255, 0.15);
        }

        .form-check-input {
            background-color: transparent;
            border-color: #61758f;
            width: 1.1rem;
            height: 1.1rem;
        }

        .form-check-input:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .form-check-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(48, 184, 255, 0.2);
        }

        .btn-primary {
            background: var(--gradient-primary);
            border: none;
            border-radius: 14px;
            padding: 0.82rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0, 157, 224, 0.3);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 157, 224, 0.4);
            background: var(--gradient-hover);
        }

        .btn-primary:hover:not(:disabled)::before {
            left: 100%;
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 4px 14px rgba(0, 157, 224, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .social-btn {
            border-radius: 14px;
            border: 1px solid var(--line);
            color: #c7d6ea;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.68rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            color: #eaf4ff;
            border-color: rgba(48, 184, 255, 0.58);
            background: rgba(48, 184, 255, 0.1);
            transform: translateY(-2px);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: #7f8da3;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--line);
        }

        .footer-text {
            font-size: 0.85rem;
            color: var(--muted);
        }

        a {
            color: #85daff;
            transition: color 0.2s ease;
            text-decoration: none;
        }

        a:hover {
            color: #b5ebff;
        }

        .alert {
            border-radius: 12px;
            font-size: 0.9rem;
            padding: 0.75rem 1rem;
        }

        .alert-danger {
            background: rgba(255, 107, 107, 0.14);
            border-color: rgba(255, 107, 107, 0.45);
            color: #ffc7c7;
        }

        .alert-success {
            background: rgba(19, 216, 196, 0.16);
            border-color: rgba(19, 216, 196, 0.52);
            color: #bdfff8;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 576px) {
            body {
                align-items: flex-start;
                padding: 16px;
            }

            .auth-card {
                padding: 1.9rem 1.2rem;
                border-radius: 20px;
            }

            .brand {
                font-size: 1.85rem;
            }
        }

        .tab-pane {
            transition: none !important;
        }

        .tab-pane:not(.show) {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="mb-4">
                <div class="brand">DTing</div>
                <div class="subtitle">Sign in to continue to your dashboard</div>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="needs-validation" novalidate>
                <!-- Login Method Selection -->
                <div class="mb-4">
                    <div class="nav-pills d-flex gap-2" role="tablist">
                        <button class="nav-link flex-fill active py-2" id="method-email-tab" 
                                data-bs-toggle="pill" data-bs-target="#method-email" 
                                type="button" role="tab" aria-selected="true">
                            <i class="far fa-envelope me-2"></i>Email Login
                        </button>
                        <button class="nav-link flex-fill py-2" id="method-phone-tab" 
                                data-bs-toggle="pill" data-bs-target="#method-phone" 
                                type="button" role="tab" aria-selected="false">
                            <i class="fas fa-phone-alt me-2"></i>Phone Login
                        </button>
                    </div>
                </div>

                <!-- Email Login Fields -->
                <div class="tab-pane fade show active" id="method-email" role="tabpanel">
                    <div class="mb-3">
                        <input type="email" name="email" id="email" class="form-control" 
                               placeholder="Email address" required autocomplete="email">
                        <div class="invalid-feedback">Please enter a valid email address.</div>
                    </div>

                    <div class="mb-3">
                        <div class="input-group">
                            <input type="password" name="email-password" id="email-password" class="form-control" 
                                   placeholder="Password" required autocomplete="current-password">
                            <span class="input-group-text" id="toggleEmailPassword">
                                <i class="far fa-eye" id="emailEyeIcon"></i>
                            </span>
                        </div>
                        <div class="invalid-feedback">Password is required.</div>
                    </div>
                </div>

                <!-- Phone Login Fields -->
                <div class="tab-pane fade" id="method-phone" role="tabpanel">
                    <div class="mb-3">
                        <label class="form-label small text-muted mb-2" for="country-code">Select Country</label>
                        <select class="form-select country-select" id="country-code" name="country_code" required>
                            <option value="" disabled selected>Select country</option>
                        </select>
                        <div class="invalid-feedback">Please select a country code.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small text-muted mb-2" for="phone-number">Phone Number</label>
                        <div class="input-group">
                            <input type="tel" id="phone-number" name="phone_number" class="form-control" 
                                   placeholder="e.g., 1712345678" required autocomplete="tel">
                        </div>
                        <div class="invalid-feedback">Please enter a valid phone number.</div>
                    </div>

                    <div class="mb-3">
                        <div class="input-group">
                            <input type="password" name="phone-password" id="phone-password" class="form-control" 
                                   placeholder="Password" required autocomplete="current-password">
                            <span class="input-group-text" id="togglePhonePassword">
                                <i class="far fa-eye" id="phoneEyeIcon"></i>
                            </span>
                        </div>
                        <div class="invalid-feedback">Password is required.</div>
                    </div>
                </div>

                <!-- Error/Success Messages -->
                <div id="error-message" class="alert alert-danger d-none"></div>
                <div id="success-message" class="alert alert-success d-none"></div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label small" for="remember">Remember me</label>
                    </div>
                    <a href="/forget-password" class="small fw-medium text-decoration-none">
                        Forgot password?
                    </a>
                </div>

                <button id="login-btn" type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>

            <div class="divider my-4">or continue with</div>

            <!-- Social Login -->
            <div class="d-grid gap-3 mb-4">
                <button class="btn social-btn d-flex align-items-center justify-content-center" onclick="googleSignUp()">
                    <i class="fab fa-google me-3 fs-5 text-danger"></i>
                    Continue with Google
                </button>
                <button class="btn social-btn d-flex align-items-center justify-content-center" onclick="facebookSignUp()">
                    <i class="fab fa-facebook-f me-3 fs-5 text-primary"></i>
                    Continue with Facebook
                </button>
            </div>

            <p class="text-center mt-4 footer-text">
                Don&rsquo;t have an account?
                <a href="/signup" class="fw-semibold text-decoration-none">
                    Create one
                </a>
            </p>
        </div>
    </div>

    <script type="module" src="/static/js/countries.js"></script>
    
    <script type="module" src="/static/js/user_auth.js"></script>
    <script src="/static/js/dialog.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // loadCountries is provided by countries.js module
        
        // Global variables
        let currentLoginMethod = 'email';
        let isSubmitting = false;

        // DOM elements
        const elements = {
            emailTab: document.getElementById('method-email-tab'),
            phoneTab: document.getElementById('method-phone-tab'),
            emailForm: document.getElementById('method-email'),
            phoneForm: document.getElementById('method-phone'),
            emailInput: document.getElementById('email'),
            emailPassword: document.getElementById('email-password'),
            phoneNumber: document.getElementById('phone-number'),
            phonePassword: document.getElementById('phone-password'),
            countryCode: document.getElementById('country-code'),
            toggleEmailPassword: document.getElementById('toggleEmailPassword'),
            togglePhonePassword: document.getElementById('togglePhonePassword'),
            emailEyeIcon: document.getElementById('emailEyeIcon'),
            phoneEyeIcon: document.getElementById('phoneEyeIcon'),
            errorMessage: document.getElementById('error-message'),
            successMessage: document.getElementById('success-message'),
            loginBtn: document.getElementById('login-btn'),
            loginSpinner: document.getElementById('loginSpinner'),
            loginBtnText: document.getElementById('loginBtnText')
        };

        // Initialize the page
        document.addEventListener('DOMContentLoaded', async function() {
            if (typeof bootstrap !== 'undefined' && bootstrap.Tab) {
                await initCountrySelector();
                setupEventListeners();
                updateSubmitState();
            } else {
                await loadBootstrapAndInit();
            }
        });

        // Load Bootstrap and initialize
        async function loadBootstrapAndInit() {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js';
            script.onload = async function() {
                await initCountrySelector();
                setupEventListeners();
                updateSubmitState();
            };
            document.head.appendChild(script);
        }

        // Initialize country selector
        async function initCountrySelector() {
            await loadCountries();
            populateCountryDropdown();
        }

        // Populate country dropdown
        function populateCountryDropdown() {
            if (elements.countryCode) {
                elements.countryCode.innerHTML = '<option value="" disabled selected>Select country</option>';
                window.countries.forEach(country => {
                    const option = document.createElement('option');
                    option.value = country.country_code;
                    option.textContent = `${country.flag_emoji} ${country.country_name} ${country.country_code}`;
                    elements.countryCode.appendChild(option);
                });
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            // Tab switching
            if (elements.emailTab) {
                elements.emailTab.addEventListener('shown.bs.tab', function() {
                    currentLoginMethod = 'email';
                    clearAlerts();
                    updateSubmitState();
                });
            }

            if (elements.phoneTab) {
                elements.phoneTab.addEventListener('shown.bs.tab', function() {
                    currentLoginMethod = 'phone';
                    clearAlerts();
                    updateSubmitState();
                });
            }

            // Password toggle
            if (elements.toggleEmailPassword) {
                elements.toggleEmailPassword.addEventListener('click', function() {
                    togglePasswordVisibility(elements.emailPassword, elements.emailEyeIcon);
                });
            }

            if (elements.togglePhonePassword) {
                elements.togglePhonePassword.addEventListener('click', function() {
                    togglePasswordVisibility(elements.phonePassword, elements.phoneEyeIcon);
                });
            }

            // Input validation
            const allInputs = [
                elements.emailInput, elements.emailPassword,
                elements.phoneNumber, elements.phonePassword
            ].filter(input => input);

            allInputs.forEach(input => {
                input.addEventListener('input', function() {
                    if (this.checkValidity()) {
                        this.classList.remove('is-invalid');
                    }
                    updateSubmitState();
                });
            });

            if (elements.countryCode) {
                elements.countryCode.addEventListener('change', function() {
                    if (this.value) {
                        this.classList.remove('is-invalid');
                    }
                    updateSubmitState();
                });
            }
        }

        // Toggle password visibility
        function togglePasswordVisibility(inputField, iconElement) {
            if (inputField.type === 'password') {
                inputField.type = 'text';
                iconElement.classList.remove('fa-eye');
                iconElement.classList.add('fa-eye-slash');
            } else {
                inputField.type = 'password';
                iconElement.classList.remove('fa-eye-slash');
                iconElement.classList.add('fa-eye');
            }
        }

        // Handle email login
        async function handleEmailLogin(e) {
            e.preventDefault();
            
            if (!validateEmailForm()) return;
            if (isSubmitting) return;
            
            setLoading(true);
            clearAlerts();
            
            const email_address = elements.emailInput.value.trim();
            const password = elements.emailPassword.value;
            
            try {
                await loginUser(email_address, null, null, password);
            } catch (error) {
                showError(error.message || 'Login failed. Please try again.');
            } finally {
                setLoading(false);
            }
        }

        // Handle phone login
        async function handlePhoneLogin(e) {
            e.preventDefault();
            
            if (!validatePhoneForm()) return;
            if (isSubmitting) return;
            
            setLoading(true);
            clearAlerts();
            
            const country_code = elements.countryCode.value;
            const phone_number = elements.phoneNumber.value;
            const password = elements.phonePassword.value;
            
            try {
                await loginUser(null, phone_number, country_code, password);
            } catch (error) {
                showError(error.message || 'Login failed. Please try again.');
            } finally {
                setLoading(false);
            }
        }

        // Validate email form
        function validateEmailForm() {
            let isValid = true;
            
            if (!elements.emailInput.value.trim()) {
                showFieldError(elements.emailInput, 'Please enter your email address.');
                isValid = false;
            } else if (!isValidEmail(elements.emailInput.value)) {
                showFieldError(elements.emailInput, 'Please enter a valid email address.');
                isValid = false;
            } else {
                elements.emailInput.classList.add('is-valid');
            }
            
            if (!elements.emailPassword.value) {
                showFieldError(elements.emailPassword, 'Please enter your password.');
                isValid = false;
            } else {
                elements.emailPassword.classList.add('is-valid');
            }
            
            if (isValid) {
                elements.emailForm.classList.add('was-validated');
            }
            
            return isValid;
        }

        // Validate phone form
        function validatePhoneForm() {
            let isValid = true;
            
            if (!elements.countryCode.value) {
                showFieldError(elements.countryCode, 'Please select a country code.');
                isValid = false;
            } else {
                elements.countryCode.classList.add('is-valid');
            }
            
            if (!elements.phoneNumber.value) {
                showFieldError(elements.phoneNumber, 'Please enter your phone number.');
                isValid = false;
            } else if (!isValidPhone(elements.phoneNumber.value)) {
                showFieldError(elements.phoneNumber, 'Please enter a valid phone number.');
                isValid = false;
            } else {
                elements.phoneNumber.classList.add('is-valid');
            }
            
            if (!elements.phonePassword.value) {
                showFieldError(elements.phonePassword, 'Please enter your password.');
                isValid = false;
            } else {
                elements.phonePassword.classList.add('is-valid');
            }
            
            if (isValid) {
                elements.phoneForm.classList.add('was-validated');
            }
            
            return isValid;
        }

        // Show field error
        function showFieldError(inputElement, message) {
            inputElement.classList.add('is-invalid');
            inputElement.classList.remove('is-valid');
            
            let errorElement = inputElement.nextElementSibling;
            if (!errorElement || !errorElement.classList.contains('invalid-feedback')) {
                errorElement = document.createElement('div');
                errorElement.className = 'invalid-feedback';
                inputElement.parentNode.appendChild(errorElement);
            }
            errorElement.textContent = message;
        }

        // Validate email
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // Validate phone
        function isValidPhone(phone) {
            return /^[+]?\d{10,15}$/.test(phone.replace(/\s/g, ''));
        }

        // Set loading state
        function setLoading(isLoading) {
            isSubmitting = isLoading;
            elements.loginBtn.disabled = !isLoading ? !validateCurrentForm() : true;
            
            const spinner = document.getElementById('loginSpinner') || document.createElement('span');
            if (!spinner.id) {
                spinner.id = 'loginSpinner';
                spinner.className = 'spinner-border spinner-border-sm d-none me-2';
                elements.loginBtn.insertBefore(spinner, elements.loginBtn.firstChild);
            }
            
            spinner.classList.toggle('d-none', !isLoading);
            
            if (elements.loginBtnText) {
                elements.loginBtnText.textContent = isLoading ? 'Signing In...' : 'Sign In';
            }
            elements.loginBtn.classList.toggle('loading', isLoading);
        }

        // Update submit state based on form validity
        function updateSubmitState() {
            const isValid = validateCurrentForm();
            if (elements.loginBtn) {
                elements.loginBtn.disabled = !isValid || isSubmitting;
            }
        }

        // Validate current form based on active tab
        function validateCurrentForm() {
            if (currentLoginMethod === 'email') {
                return elements.emailInput.value.trim() && 
                       elements.emailPassword.value && 
                       isValidEmail(elements.emailInput.value);
            } else {
                return elements.countryCode.value && 
                       elements.phoneNumber.value && 
                       elements.phonePassword.value &&
                       isValidPhone(elements.phoneNumber.value);
            }
        }

        // Unified login function
        async function loginUser(email_address, phone_number, country_code, password) {
            const payload = {
                user_password: password,
                device_id: elements.loginBtn?.dataset?.deviceId || ('web_' + Math.random().toString(36).substr(2, 9)),
                device_uuid: elements.loginBtn?.dataset?.deviceUuid || ('uuid_' + Math.random().toString(36).substr(2, 9))
            };
            
            if (email_address) {
                payload.email_address = email_address;
            } else if (phone_number) {
                payload.phone_number = phone_number;
                payload.country_code = country_code;
            }
            
            console.log('Login payload:', payload);
            
            const response = await fetch(`${window.location.origin}/auth/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            
            const result = await response.json();
            console.log('Login response:', result);
            
            if (!response.ok) {
                let message = "Login failed";
                try {
                    message = result?.message || result?.detail || message;
                } catch (_) {}
                throw new Error(message);
            }
            
            showSuccess('Login successful! Redirecting...');
            
            const accessToken = result.data?.access_token;
            const refreshToken = result.data?.refresh_token;
            
            if (accessToken) {
                localStorage.setItem('token', accessToken);
            }
            if (refreshToken) {
                localStorage.setItem('refresh_token', refreshToken);
            }
            
            localStorage.setItem('user', JSON.stringify({
                id: result.data?.user_id,
                email: result.data?.email_address,
                deviceId: payload.device_id,
                deviceUuid: payload.device_uuid
            }));
            
            setTimeout(() => {
                window.location.href = '/account';
            }, 1500);
        }

        // Clear alerts
        function clearAlerts() {
            if (elements.errorMessage) {
                elements.errorMessage.classList.add('d-none');
                elements.errorMessage.textContent = '';
            }
            if (elements.successMessage) {
                elements.successMessage.classList.add('d-none');
                elements.successMessage.textContent = '';
            }
            
            document.querySelectorAll('.is-invalid, .is-valid').forEach(el => {
                el.classList.remove('is-invalid', 'is-valid');
            });
        }

        // Show error message
        function showError(message) {
            clearAlerts();
            if (elements.errorMessage) {
                elements.errorMessage.textContent = message;
                elements.errorMessage.classList.remove('d-none');
            }
        }

        // Show success message
        function showSuccess(message) {
            clearAlerts();
            if (elements.successMessage) {
                elements.successMessage.textContent = message;
                elements.successMessage.classList.remove('d-none');
            }
        }

        // Google Sign Up (mock implementation)
        function googleSignUp() {
            if (isSubmitting) return;
            
            setLoading(true);
            showSuccess('Google sign-in initiated. Redirecting to Google...');
            
            setTimeout(() => {
                window.location.href = '/dashboard.html';
            }, 1500);
        }

        // Facebook Sign Up (mock implementation)
        function facebookSignUp() {
            if (isSubmitting) return;
            
            setLoading(true);
            showSuccess('Facebook sign-in initiated. Redirecting to Facebook...');
            
            setTimeout(() => {
                window.location.href = '/dashboard.html';
            }, 1500);
        }

        // Real-time validation
        [elements.emailInput, elements.emailPassword, elements.phoneNumber, elements.phonePassword].forEach(input => {
            if (input) {
                input.addEventListener('keyup', function() {
                    if (this.checkValidity()) {
                        this.classList.remove('is-invalid');
                    }
                    updateSubmitState();
                });
            }
        });

        if (elements.countryCode) {
            elements.countryCode.addEventListener('change', function() {
                if (this.checkValidity()) {
                    this.classList.remove('is-invalid');
                }
                updateSubmitState();
            });
        }

        // Form submit handler
        const loginForm = document.getElementById('login-form');
        if (loginForm) {
            loginForm.addEventListener('submit', function(e) {
                if (currentLoginMethod === 'email') {
                    handleEmailLogin(e);
                } else {
                    handlePhoneLogin(e);
                }
            });
        }
    </script>
</body>
</html>
