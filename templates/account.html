<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTing - Account</title>
<link rel="icon" type="image/x-icon" href="/static/image/DTing.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    :root {
        --bg-0: #06080f;
        --bg-1: #0a1324;
        --card: rgba(10, 16, 28, 0.82);
        --card-border: rgba(255, 255, 255, 0.14);
        --text: #e6edf7;
        --muted: #94a3b8;
        --line: rgba(148, 163, 184, 0.28);
        --accent: #30b8ff;
        --accent-2: #13d8c4;
        --input-bg: rgba(14, 23, 39, 0.88);
    }

    body {
        min-height: 100vh;
        font-family: "Manrope", "Segoe UI", system-ui, sans-serif;
        color: var(--text);
        background:
            radial-gradient(70rem 40rem at 10% 8%, rgba(48, 184, 255, 0.22), transparent 58%),
            radial-gradient(52rem 35rem at 93% 90%, rgba(19, 216, 196, 0.2), transparent 62%),
            linear-gradient(145deg, var(--bg-0), var(--bg-1));
        padding: 24px;
    }

    .page-wrap {
        max-width: 1020px;
        margin: 0 auto;
    }

    .glass {
        background: linear-gradient(150deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015)) var(--card);
        border: 1px solid var(--card-border);
        border-radius: 22px;
        backdrop-filter: blur(24px);
        box-shadow: 0 28px 64px rgba(0, 0, 0, 0.45);
    }

    .hero {
        padding: 1.4rem;
        display: grid;
        gap: 1rem;
        grid-template-columns: auto 1fr auto;
        align-items: center;
    }

    .avatar {
        width: 92px;
        height: 92px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(255, 255, 255, 0.24);
    }

    .name {
        margin: 0;
        font-size: 1.6rem;
        font-weight: 800;
    }

    .meta {
        margin: 0.3rem 0 0;
        color: var(--muted);
        font-size: 0.95rem;
    }

    .brand-chip {
        font-size: 0.8rem;
        color: #d8f6ff;
        padding: 0.42rem 0.75rem;
        border: 1px solid rgba(48, 184, 255, 0.5);
        background: rgba(48, 184, 255, 0.12);
        border-radius: 999px;
    }

    .content-grid {
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 16px;
        margin-top: 16px;
    }

    .section {
        padding: 1.25rem;
    }

    .section-title {
        margin: 0 0 0.95rem;
        font-size: 1.03rem;
        font-weight: 700;
        color: #d8e9fb;
    }

    .form-control {
        border-radius: 14px;
        padding: 0.82rem 1rem;
        color: var(--text);
        border: 1px solid var(--line);
        background: var(--input-bg);
    }

    .form-control:focus {
        color: var(--text);
        background: var(--input-bg);
        border-color: var(--accent);
        box-shadow: 0 0 0 0.2rem rgba(48, 184, 255, 0.2);
    }

    .hint {
        color: var(--muted);
        font-size: 0.84rem;
    }

    .stat-list {
        display: grid;
        gap: 10px;
    }

    .stat {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0.85rem 0.95rem;
        background: rgba(255, 255, 255, 0.02);
    }

    .stat .label {
        color: var(--muted);
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        margin-bottom: 0.2rem;
    }

    .stat .value {
        color: #f0f6ff;
        font-size: 0.96rem;
    }

    .btn-save {
        margin-top: 2px;
        background: linear-gradient(95deg, #009de0, #0cc9ba);
        border: none;
        border-radius: 14px;
        padding: 0.74rem 1.2rem;
        font-weight: 700;
        color: #fff;
    }

    .btn-save:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 26px rgba(0, 157, 224, 0.35);
    }

    .alert {
        border-radius: 12px;
    }

    .alert-danger {
        background: rgba(255, 107, 107, 0.14);
        border-color: rgba(255, 107, 107, 0.45);
        color: #ffc7c7;
    }

    .alert-success {
        background: rgba(19, 216, 196, 0.16);
        border-color: rgba(19, 216, 196, 0.52);
        color: #bdfff8;
    }

    @media (max-width: 900px) {
        .content-grid {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 640px) {
        body {
            padding: 14px;
        }

        .hero {
            grid-template-columns: 1fr;
            text-align: center;
            justify-items: center;
        }

        .name {
            font-size: 1.32rem;
        }
    }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="page-wrap">
    <div class="glass hero">
        <img id="profileImage" class="avatar" src="https://i.pravatar.cc/150?img=3" alt="Profile Photo">
        <div>
            <h1 id="profileFullName" class="name">Loading...</h1>
            <p class="meta">
                <span id="profileEmail">loading@example.com</span>
                <span id="profileVerifyBadge" class="text-warning ms-2">
                    <i class="fas fa-exclamation-circle"></i> Unverified
                </span>
            </p>
        </div>
        <span class="brand-chip">Account Center</span>
    </div>

    <div class="content-grid">
        <section class="glass section">
            <h2 class="section-title">Personal Information</h2>
            <form id="profileForm" class="needs-validation" novalidate>
                <div class="mb-3">
                    <label class="hint mb-1">First Name</label>
                    <input id="firstName" type="text" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="hint mb-1">Last Name</label>
                    <input id="lastName" type="text" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="hint mb-1">Phone</label>
                    <input id="phoneNumber" type="text" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="hint mb-1">Change Password</label>
                    <input type="password" class="form-control" placeholder="Leave blank to keep unchanged">
                </div>
                <div id="profileError" class="alert alert-danger d-none"></div>
                <div id="profileSuccess" class="alert alert-success d-none"></div>
                <button type="submit" class="btn btn-save">Save Changes</button>
            </form>
        </section>

        <aside class="glass section">
            <h2 class="section-title">Session & Status</h2>
            <div class="stat-list">
                <div class="stat">
                    <div class="label">User ID</div>
                    <div id="statUserId" class="value">-</div>
                </div>
                <div class="stat">
                    <div class="label">Phone Verified</div>
                    <div id="statPhoneVerified" class="value">-</div>
                </div>
                <div class="stat">
                    <div class="label">Joined</div>
                    <div id="statJoinedAt" class="value">-</div>
                </div>
                <div class="stat">
                    <div class="label">Last Login</div>
                    <div id="statLastLogin" class="value">-</div>
                </div>
                <div class="stat">
                    <div class="label">Last IP</div>
                    <div id="statLastIp" class="value">-</div>
                </div>
            </div>
        </aside>
    </div>
</div>

<script src="/static/js/utils.js"></script>
<script src="/static/js/auth.js"></script>
<script>
    function getCookie(name) {
        const raw = document.cookie.split("; ").find((v) => v.startsWith(`${name}=`));
        return raw ? decodeURIComponent(raw.split("=").slice(1).join("=")) : null;
    }

    function splitName(fullName) {
        const value = (fullName || "").trim();
        if (!value) return { firstName: "", lastName: "" };
        const parts = value.split(/\s+/);
        return { firstName: parts.shift() || "", lastName: parts.join(" ") };
    }

    function formatDate(value) {
        if (!value) return "-";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return value;
        return d.toLocaleString();
    }

    function showError(message) {
        const box = document.getElementById("profileError");
        const ok = document.getElementById("profileSuccess");
        ok.classList.add("d-none");
        ok.textContent = "";
        box.textContent = message;
        box.classList.remove("d-none");
    }

    function showSuccess(message) {
        const box = document.getElementById("profileSuccess");
        const err = document.getElementById("profileError");
        err.classList.add("d-none");
        err.textContent = "";
        box.textContent = message;
        box.classList.remove("d-none");
    }

    function setProfileData(profile, session) {
        const fullName = profile?.full_name || "Unknown User";
        const name = splitName(fullName);
        const email = profile?.email_address || "-";
        const phone = [profile?.country_code || "", profile?.phone_number || ""].join("");
        const image = profile?.profile_picture || "https://i.pravatar.cc/150?img=3";
        const isVerified = !!profile?.email_verified;

        document.getElementById("profileImage").src = image;
        document.getElementById("profileFullName").textContent = fullName;
        document.getElementById("profileEmail").textContent = email;
        document.getElementById("firstName").value = name.firstName;
        document.getElementById("lastName").value = name.lastName;
        document.getElementById("phoneNumber").value = phone;

        const badge = document.getElementById("profileVerifyBadge");
        if (isVerified) {
            badge.className = "text-success ms-2";
            badge.innerHTML = '<i class="fas fa-check-circle"></i> Verified';
        } else {
            badge.className = "text-warning ms-2";
            badge.innerHTML = '<i class="fas fa-exclamation-circle"></i> Unverified';
        }

        document.getElementById("statUserId").textContent = profile?.user_id || "-";
        document.getElementById("statPhoneVerified").textContent = profile?.phone_verified ? "Yes" : "No";
        document.getElementById("statJoinedAt").textContent = formatDate(profile?.created_at);
        document.getElementById("statLastLogin").textContent = formatDate(session?.login_at);
        document.getElementById("statLastIp").textContent = session?.last_ip_address || "-";
    }

    async function loadProfile() {
        const userId = getCookie("user_id") || localStorage.getItem("user_id");
        const accessToken = getCookie("access_token") || localStorage.getItem("access_token");
        const androidId = (typeof getDeviceId === "function") ? getDeviceId() : (localStorage.getItem("device_id") || "web_device_id");
        const androidUuid = (typeof getDeviceUuid === "function") ? getDeviceUuid() : (localStorage.getItem("device_uuid") || "web_device_uuid");

        if (!userId || !accessToken) {
            showError("Please login first.");
            window.setTimeout(() => { window.location.href = "/login"; }, 600);
            return;
        }

        try {
            const response = await fetch("/user/profile", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: userId,
                    access_token: accessToken,
                    android_id: androidId,
                    android_uuid: androidUuid
                })
            });

            if (!response.ok) {
                const message = (typeof parseResponseError === "function")
                    ? await parseResponseError(response)
                    : `Failed to load profile (${response.status})`;
                throw new Error(message);
            }

            const result = await response.json();
            setProfileData(result?.data?.profile || {}, result?.data?.session || {});
            showSuccess("Profile loaded.");
        } catch (error) {
            showError(error?.message || "Failed to load profile.");
        }
    }

    (() => {
        const forms = document.querySelectorAll(".needs-validation");
        Array.from(forms).forEach((form) => {
            form.addEventListener("submit", (event) => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add("was-validated");
                event.preventDefault();
            });
        });
    })();

    loadProfile();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
