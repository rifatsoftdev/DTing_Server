<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTing — Create Account</title>
    <link rel="icon" type="image/x-icon" href="/static/image/DTing.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --bg-0: #06080f;
            --bg-1: #0a1324;
            --card: rgba(10, 16, 28, 0.82);
            --card-border: rgba(255, 255, 255, 0.14);
            --text: #e6edf7;
            --muted: #94a3b8;
            --line: rgba(148, 163, 184, 0.28);
            --accent: #30b8ff;
            --accent-2: #13d8c4;
            --input-bg: rgba(14, 23, 39, 0.88);
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Manrope", "Segoe UI", system-ui, sans-serif;
            color: var(--text);
            background:
                radial-gradient(70rem 40rem at 10% 8%, rgba(48, 184, 255, 0.22), transparent 58%),
                radial-gradient(52rem 35rem at 93% 90%, rgba(19, 216, 196, 0.2), transparent 62%),
                linear-gradient(145deg, var(--bg-0), var(--bg-1));
            padding: 24px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            z-index: 0;
            border-radius: 50%;
            filter: blur(65px);
            pointer-events: none;
        }

        body::before {
            width: 260px;
            height: 260px;
            top: -70px;
            right: 8%;
            background: rgba(48, 184, 255, 0.18);
        }

        body::after {
            width: 240px;
            height: 240px;
            bottom: -60px;
            left: 9%;
            background: rgba(19, 216, 196, 0.14);
        }

        .auth-wrapper {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }

        .auth-card {
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015)) var(--card);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            padding: 2.35rem 2.1rem;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
            animation: fadeUp 0.55s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand {
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-align: center;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 2.2rem;
        }

        .form-control,
        .form-select {
            border-radius: 14px;
            padding: 0.9rem 1rem;
            font-size: 1rem;
            color: var(--text);
            border: 1px solid var(--line);
            background: var(--input-bg);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-control::placeholder {
            color: #7f8da3;
        }

        .form-control:focus,
        .form-select:focus {
            color: var(--text);
            background: var(--input-bg);
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(48, 184, 255, 0.2);
        }

        .form-select {
            --bs-form-select-bg-img: none;
            min-width: 120px;
            max-width: 150px;
            padding-right: 0.9rem;
        }

        .input-group-text {
            background: var(--input-bg);
            border: 1px solid var(--line);
            border-left: 0;
            color: #8ca0b8;
            border-radius: 0 14px 14px 0;
            cursor: pointer;
        }

        .input-group .form-control {
            border-right: 0;
            border-radius: 14px 0 0 14px;
        }

        .input-group .form-select {
            border-right: 0;
            border-radius: 14px 0 0 14px;
        }

        .input-group .form-select + .form-control {
            border-left: 0;
            border-right: 1px solid var(--line);
            border-radius: 0 14px 14px 0;
        }

        .input-group:focus-within .input-group-text {
            border-color: var(--accent);
            color: #c5f0ff;
        }

        .btn-primary {
            background: linear-gradient(95deg, #009de0, #0cc9ba);
            border: none;
            border-radius: 14px;
            padding: 0.82rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.2px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 26px rgba(0, 157, 224, 0.35);
        }

        .social-btn {
            border-radius: 14px;
            border: 1px solid var(--line);
            color: #c7d6ea;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.68rem;
            font-weight: 500;
            transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .social-btn:hover {
            color: #eaf4ff;
            border-color: rgba(48, 184, 255, 0.58);
            background: rgba(48, 184, 255, 0.1);
            transform: translateY(-2px);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: #7f8da3;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--line);
        }

        .footer-text {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .small {
            color: var(--muted);
        }

        a {
            color: #85daff;
            transition: color 0.2s ease;
        }

        a:hover {
            color: #b5ebff;
        }

        .alert {
            border-radius: 12px;
        }

        .alert-danger {
            background: rgba(255, 107, 107, 0.14);
            border-color: rgba(255, 107, 107, 0.45);
            color: #ffc7c7;
        }

        .alert-success {
            background: rgba(19, 216, 196, 0.16);
            border-color: rgba(19, 216, 196, 0.52);
            color: #bdfff8;
        }

        @media (max-width: 576px) {
            body {
                align-items: flex-start;
            }

            .auth-card {
                padding: 1.9rem 1.2rem;
                border-radius: 20px;
            }

            .brand {
                font-size: 1.85rem;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="mb-4">
            <div class="brand">DTing</div>
            <div class="subtitle">Create your account to get started</div>
        </div>

        <!-- Signup form -->
        <form id="signup-form" class="needs-validation" novalidate>
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <input type="text" name="first_name" class="form-control" placeholder="First name" required>
                    <div class="invalid-feedback">Required.</div>
                </div>
                <div class="col-md-6">
                    <input type="text" name="last_name" class="form-control" placeholder="Last name">
                </div>
            </div>

            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email address" required>
                <div class="invalid-feedback">Valid email required.</div>
            </div>
            
            <div class="mb-3">
                <div class="input-group">
                    <select name="country_code" class="form-select" aria-label="Country code">
                        <option value="+88" selected>BD +88</option>
                        <option value="+91">IN +91</option>
                        <option value="+1">US +1</option>
                        <option value="+44">UK +44</option>
                        <option value="+971">UAE +971</option>
                        <option value="+966">SA +966</option>
                    </select>
                    <input type="tel" name="phone" class="form-control" placeholder="Phone number" required>
                </div>
                <div class="invalid-feedback">Phone number is required.</div>
            </div>

            <div class="mb-4">
                <div class="input-group">
                    <input type="password" name="password" id="passwordSignup" class="form-control" placeholder="Create password (min 8 chars)" minlength="8" required>
                    <span class="input-group-text" id="togglePasswordSignup">
                        <i class="far fa-eye" id="eyeIconSignup"></i>
                    </span>
                </div>
                <div class="invalid-feedback">Minimum 8 characters.</div>
            </div>
            
            <div class="mb-3">
                <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="Confirm password" minlength="8" required>
                <div class="invalid-feedback">Please confirm your password.</div>
            </div>
            
            <!-- Error/Success Messages -->
            <div id="error-message" class="alert alert-danger d-none"></div>
            <div id="success-message" class="alert alert-success d-none"></div>

            <button id="signup-submit-btn" class="btn btn-primary w-100" type="submit">Create Account</button>
        </form>

        <div class="divider my-4">or continue with</div>

        <!-- Social signup -->
        <div class="d-grid gap-3 mb-4">
            <button type="button" class="btn social-btn d-flex align-items-center justify-content-center" onclick="googleSignUp()">
                <i class="fab fa-google me-3 fs-5 text-danger"></i>
                Sign up with Google
            </button>
            <button type="button" class="btn social-btn d-flex align-items-center justify-content-center" onclick="facebookSignUp()">
                <i class="fab fa-facebook-f me-3 fs-5 text-primary"></i>
                Sign up with Facebook
            </button>
        </div>

        <p class="text-center mt-4 footer-text">
            Already have an account?
            <a href="/login" class="fw-semibold text-decoration-none">
                Sign in
            </a>
        </p>

        <p class="text-center mt-3 footer-text">
            By continuing, you agree to our
            <a href="/terms" class="text-decoration-none">Terms</a>
            &
            <a href="/privacy" class="text-decoration-none">Privacy Policy</a>
        </p>

    </div>
</div>

<script src="/static/js/utils.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/dialog.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const signupForm = document.getElementById("signup-form");
    const toggle = document.getElementById("togglePasswordSignup");
    const pwd = document.getElementById("passwordSignup");
    const confirmPwd = document.getElementById("confirm_password");
    const eye = document.getElementById("eyeIconSignup");
    const submitBtn = document.getElementById("signup-submit-btn");
    const errorBox = document.getElementById("error-message");
    const successBox = document.getElementById("success-message");

    function setError(message) {
        successBox.classList.add("d-none");
        if (!message) {
            errorBox.classList.add("d-none");
            errorBox.textContent = "";
            return;
        }
        errorBox.textContent = message;
        errorBox.classList.remove("d-none");
    }

    function setSuccess(message) {
        errorBox.classList.add("d-none");
        errorBox.textContent = "";
        if (!message) {
            successBox.classList.add("d-none");
            successBox.textContent = "";
            return;
        }
        successBox.textContent = message;
        successBox.classList.remove("d-none");
    }

    function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        submitBtn.textContent = isLoading ? "Creating..." : "Create Account";
    }

    toggle.onclick = () => {
        pwd.type = pwd.type === "password" ? "text" : "password";
        eye.classList.toggle("fa-eye");
        eye.classList.toggle("fa-eye-slash");
    };

    [pwd, confirmPwd].forEach((el) => {
        el.addEventListener("input", () => {
            confirmPwd.setCustomValidity("");
            setError("");
        });
    });

    signupForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        setError("");
        setSuccess("");

        const formData = new FormData(signupForm);
        const firstName = (formData.get("first_name") || "").toString().trim();
        const lastName = (formData.get("last_name") || "").toString().trim();
        const email = (formData.get("email") || "").toString().trim();
        const phone = (formData.get("phone") || "").toString().trim();
        const countryCode = (formData.get("country_code") || "").toString().trim();
        const password = (formData.get("password") || "").toString();
        const confirmPassword = (formData.get("confirm_password") || "").toString();

        if (password !== confirmPassword) {
            confirmPwd.setCustomValidity("Passwords do not match");
        } else {
            confirmPwd.setCustomValidity("");
        }

        if (!signupForm.checkValidity()) {
            signupForm.classList.add("was-validated");
            return;
        }

        const fullName = [firstName, lastName].filter(Boolean).join(" ");
        const identity = (typeof resolveDeviceIdentity === "function")
            ? resolveDeviceIdentity()
            : { device_id: "web_device_id", device_uuid: "web_device_uuid" };

        const payload = {
            full_name: fullName,
            email_address: email,
            phone_number: phone,
            country_code: countryCode,
            user_password: password,
            device: "web",
            device_id: identity.device_id,
            device_uuid: identity.device_uuid
        };

        setLoading(true);
        try {
            const response = await fetch(`${window.location.origin}/auth/signup`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const message = (typeof parseResponseError === "function")
                    ? await parseResponseError(response)
                    : `Signup failed (${response.status})`;
                throw new Error(message);
            }

            const raw = await response.text();
            let result = {};
            try {
                result = raw ? JSON.parse(raw) : {};
            } catch (_) {
                result = {};
            }

            const message = result?.message || "Registration successful.";

            const emailVerificationToken = result?.data?.email_verification_token;
            const userId = result?.data?.user_id;
            if (!emailVerificationToken || !userId) {
                throw new Error("Registration completed, but verification data was not returned.");
            }

            setSuccess("Registration complete. OTP sent to your email.");
            signupForm.reset();
            signupForm.classList.remove("was-validated");

            if (window.DTDialog && typeof window.DTDialog.success === "function") {
                window.DTDialog.success(message, { autoClose: 1600 });
            }

            const params = new URLSearchParams({
                mode: "new_user_email",
                user_id: userId,
                method: "email",
                delever_to: email,
                email_verification_token: emailVerificationToken
            });
            setTimeout(() => {
                window.location.href = `/verification?${params.toString()}`;
            }, 800);
        } catch (err) {
            const message = err?.message || "Signup failed";
            setError(message);
            if (window.DTDialog && typeof window.DTDialog.error === "function") {
                window.DTDialog.error(message);
            }
        } finally {
            setLoading(false);
        }
    });

    function googleSignUp() {
        const message = "Google signup is not available. Please try again.";
        if (window.DTDialog && typeof window.DTDialog.error === "function") {
            window.DTDialog.error(message);
            return;
        }
        alert(message);
    }

    function facebookSignUp() {
        const message = "Facebook signup is not available. Please try again.";
        if (window.DTDialog && typeof window.DTDialog.error === "function") {
            window.DTDialog.error(message);
            return;
        }
        alert(message);
    }
</script>
</body>
</html>
