<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTing — Sign In</title>
    <link rel="icon" type="image/x-icon" href="/static/image/DTing.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --bg-0: #06080f;
            --bg-1: #0a1324;
            --card: rgba(10, 16, 28, 0.82);
            --card-border: rgba(255, 255, 255, 0.14);
            --text: #e6edf7;
            --muted: #94a3b8;
            --line: rgba(148, 163, 184, 0.28);
            --accent: #30b8ff;
            --accent-2: #13d8c4;
            --danger: #ff6b6b;
            --input-bg: rgba(14, 23, 39, 0.88);
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Manrope", "Segoe UI", system-ui, sans-serif;
            color: var(--text);
            background:
                radial-gradient(70rem 40rem at 10% 8%, rgba(48, 184, 255, 0.22), transparent 58%),
                radial-gradient(52rem 35rem at 93% 90%, rgba(19, 216, 196, 0.2), transparent 62%),
                linear-gradient(145deg, var(--bg-0), var(--bg-1));
            padding: 24px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            z-index: 0;
            border-radius: 50%;
            filter: blur(65px);
            pointer-events: none;
        }

        body::before {
            width: 260px;
            height: 260px;
            top: -70px;
            right: 8%;
            background: rgba(48, 184, 255, 0.18);
        }

        body::after {
            width: 240px;
            height: 240px;
            bottom: -60px;
            left: 9%;
            background: rgba(19, 216, 196, 0.14);
        }

        .auth-wrapper {
            width: 100%;
            max-width: 455px;
            position: relative;
            z-index: 1;
        }

        .auth-card {
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015)) var(--card);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            padding: 2.45rem 2.1rem;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
            animation: fadeUp 0.55s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand {
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-align: center;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 2.2rem;
        }

        .form-control {
            border-radius: 14px;
            padding: 0.9rem 1rem;
            font-size: 1rem;
            color: var(--text);
            border: 1px solid var(--line);
            background: var(--input-bg);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-control::placeholder {
            color: #7f8da3;
        }

        .form-control:focus {
            color: var(--text);
            background: var(--input-bg);
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(48, 184, 255, 0.2);
        }

        .input-group-text {
            background: var(--input-bg);
            border: 1px solid var(--line);
            border-left: 0;
            color: #8ca0b8;
            border-radius: 0 14px 14px 0;
            cursor: pointer;
        }

        .input-group .form-control {
            border-right: 0;
            border-radius: 14px 0 0 14px;
        }

        .input-group:focus-within .input-group-text {
            border-color: var(--accent);
            color: #c5f0ff;
        }

        .btn-primary {
            background: linear-gradient(95deg, #009de0, #0cc9ba);
            border: none;
            border-radius: 14px;
            padding: 0.82rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.2px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 26px rgba(0, 157, 224, 0.35);
        }

        .social-btn {
            border-radius: 14px;
            border: 1px solid var(--line);
            color: #c7d6ea;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.68rem;
            font-weight: 500;
            transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .social-btn:hover {
            color: #eaf4ff;
            border-color: rgba(48, 184, 255, 0.58);
            background: rgba(48, 184, 255, 0.1);
            transform: translateY(-2px);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: #7f8da3;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--line);
        }

        .footer-text {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .form-check-input {
            background-color: transparent;
            border-color: #61758f;
        }

        .form-check-input:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .form-check-label,
        .small {
            color: var(--muted);
        }

        a {
            color: #85daff;
            transition: color 0.2s ease;
        }

        a:hover {
            color: #b5ebff;
        }

        .alert {
            border-radius: 12px;
        }

        .alert-danger {
            background: rgba(255, 107, 107, 0.14);
            border-color: rgba(255, 107, 107, 0.45);
            color: #ffc7c7;
        }

        .alert-success {
            background: rgba(19, 216, 196, 0.16);
            border-color: rgba(19, 216, 196, 0.52);
            color: #bdfff8;
        }

        @media (max-width: 576px) {
            body {
                align-items: flex-start;
            }

            .auth-card {
                padding: 1.9rem 1.2rem;
                border-radius: 20px;
            }

            .brand {
                font-size: 1.85rem;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="mb-4">
            <div class="brand">DTing</div>
            <div class="subtitle">Sign in to continue to your dashboard</div>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="needs-validation" novalidate>
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email address" required>
                <div class="invalid-feedback">Please enter a valid email.</div>
            </div>

            <div class="mb-3">
                <div class="input-group">
                    <input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
                    <span class="input-group-text" id="togglePassword">
                        <i class="far fa-eye" id="eyeIcon"></i>
                    </span>
                </div>
                <div class="invalid-feedback">Password is required.</div>
            </div>
            
            <!-- Error/Success Messages -->
            <div id="error-message" class="alert alert-danger d-none"></div>
            <div id="success-message" class="alert alert-success d-none"></div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label small" for="remember">Remember me</label>
                </div>
                <a href="#" class="small fw-medium text-decoration-none">
                    Forgot password?
                </a>
            </div>

            <button id="login-btn" type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>

        <div class="divider my-4">or continue with</div>

        <!-- Social Login -->
        <div class="d-grid gap-3 mb-4">
            <button class="btn social-btn d-flex align-items-center justify-content-center" onclick="googleSignUp()">
                <i class="fab fa-google me-3 fs-5 text-danger"></i>
                Continue with Google
            </button>
            <button class="btn social-btn d-flex align-items-center justify-content-center" onclick="facebookSignUp()">
                <i class="fab fa-facebook-f me-3 fs-5 text-primary"></i>
                Continue with Facebook
            </button>
        </div>

        <p class="text-center mt-4 footer-text">
            Don’t have an account?
            <a href="/signup" class="fw-semibold text-decoration-none">
                Create one
            </a>
        </p>

    </div>
</div>

<script src="/static/js/utils.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/dialog.js"></script>
<script>
    const loginForm = document.getElementById("login-form");
    const loginBtn = document.getElementById("login-btn");
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");
    const eyeIcon = document.getElementById("eyeIcon");
    const errorMessage = document.getElementById("error-message");
    const successMessage = document.getElementById("success-message");

    function setLoading(isLoading) {
        loginBtn.disabled = isLoading;
        loginBtn.textContent = isLoading ? "Signing In..." : "Sign In";
    }

    function clearAlerts() {
        errorMessage.textContent = "";
        successMessage.textContent = "";
        errorMessage.classList.add("d-none");
        successMessage.classList.add("d-none");
    }

    function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.remove("d-none");
        successMessage.classList.add("d-none");
    }

    function showSuccess(message) {
        successMessage.textContent = message;
        successMessage.classList.remove("d-none");
        errorMessage.classList.add("d-none");
    }

    togglePassword.addEventListener("click", () => {
        passwordInput.type = passwordInput.type === "password" ? "text" : "password";
        eyeIcon.classList.toggle("fa-eye");
        eyeIcon.classList.toggle("fa-eye-slash");
    });

    loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearAlerts();

        if (!loginForm.checkValidity()) {
            loginForm.classList.add("was-validated");
            return;
        }

        loginForm.classList.add("was-validated");
        setLoading(true);

        const email = loginForm.querySelector('input[name="email"]').value.trim();
        const password = loginForm.querySelector('input[name="password"]').value;

        try {
            const result = await loginUser({
                email_address: email,
                user_password: password
            });

            const msg = result?.message || "Login successful.";
            showSuccess(msg);

            if (window.DTDialog) {
                DTDialog.success(msg, { autoClose: 1400 });
            }

            window.setTimeout(() => {
                window.location.href = "/verification";
            }, 900);
        } catch (error) {
            const msg = error?.message || "Login failed. Please try again.";
            showError(msg);
            if (window.DTDialog) {
                DTDialog.error(msg);
            }
        } finally {
            setLoading(false);
        }
    });

    function googleSignUp() {
        if (window.DTDialog) DTDialog.error("Google sign-in is not available. Please try again.");
    }

    function facebookSignUp() {
        if (window.DTDialog) DTDialog.error("Facebook sign-in is not available. Please try again.");
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
