<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTing — Link Expired</title>
    <link rel="icon" type="image/x-icon" href="/static/image/logo.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-0: #06080f;
            --bg-1: #0a1324;
            --card: rgba(10, 16, 28, 0.82);
            --card-border: rgba(255, 255, 255, 0.14);
            --text: #e6edf7;
            --muted: #94a3b8;
            --line: rgba(148, 163, 184, 0.28);
            --accent: #30b8ff;
            --accent-2: #13d8c4;
            --gradient-primary: linear-gradient(95deg, #009de0, #0cc9ba);
            --gradient-hover: linear-gradient(95deg, #00b4e6, #26d0c0);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Manrope", "Segoe UI", system-ui, sans-serif;
            color: var(--text);
            background:
                radial-gradient(70rem 40rem at 10% 8%, rgba(48, 184, 255, 0.22), transparent 58%),
                radial-gradient(52rem 35rem at 93% 90%, rgba(19, 216, 196, 0.2), transparent 62%),
                linear-gradient(145deg, var(--bg-0), var(--bg-1));
            padding: 24px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            z-index: 0;
            border-radius: 50%;
            filter: blur(65px);
            pointer-events: none;
        }

        body::before {
            width: 260px;
            height: 260px;
            top: -70px;
            right: 8%;
            background: rgba(48, 184, 255, 0.18);
        }

        body::after {
            width: 240px;
            height: 240px;
            bottom: -60px;
            left: 9%;
            background: rgba(19, 216, 196, 0.14);
        }

        .error-wrapper {
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 1;
        }

        .error-card {
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015)) var(--card);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            padding: 2.45rem 2.1rem;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
            animation: fadeUp 0.55s ease;
            text-align: center;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand {
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-align: center;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        .icon-box {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            box-shadow: 0 14px 34px rgba(48, 184, 255, 0.25);
            font-size: 1.85rem;
        }

        .error-title {
            font-size: 1.55rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
            text-align: center;
        }

        .error-message {
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 2rem;
            text-align: center;
            line-height: 1.6;
        }

        .btn-primary {
            background: var(--gradient-primary);
            border: none;
            border-radius: 14px;
            padding: 0.82rem 1.5rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.2px;
            transition: all 0.3s ease;
            display: inline-block;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0, 157, 224, 0.3);
        }

        .btn-primary::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 157, 224, 0.4);
            background: var(--gradient-hover);
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        @media (max-width: 576px) {
            body {
                align-items: flex-start;
                padding: 16px;
            }

            .error-card {
                padding: 1.9rem 1.2rem;
                border-radius: 20px;
            }

            .brand,
            .error-title {
                font-size: 1.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-wrapper">
        <div class="error-card">
            <div class="brand mb-3">DTing</div>

            <div class="icon-box">
                <i class="fas fa-hourglass-end"></i>
            </div>

            <div class="error-title">Link Expired</div>
            <div class="error-message">
                The password reset link you used is no longer valid or has expired.<br>
                Please request a new link to continue.
            </div>

            <a href="/forget-password" class="btn btn-primary">
                Request New Link
            </a>

            <div class="footer">
                If you didn't request this, you can safely ignore it.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
