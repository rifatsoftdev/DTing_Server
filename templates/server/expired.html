<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding: 20px;
    }

    .card {
        width: 100%;
        max-width: 420px;
        padding: 40px 30px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
        color: white;
        animation: fadeIn 0.6s ease-in-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(15px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .icon {
        font-size: 50px;
        margin-bottom: 15px;
    }

    h1 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 10px;
    }

    p {
        font-size: 15px;
        opacity: 0.9;
        margin-bottom: 25px;
        line-height: 1.5;
    }

    .btn {
        display: inline-block;
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        background: #ffffff;
        color: #5a67d8;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.3s ease;
    }

    .btn:hover {
        background: #e6e9ff;
        transform: translateY(-2px);
    }

    .footer {
        margin-top: 20px;
        font-size: 13px;
        opacity: 0.7;
    }

    @media (max-width: 480px) {
        .card {
            padding: 30px 20px;
        }

        h1 {
            font-size: 20px;
        }

        p {
            font-size: 14px;
        }
    }
</style>
```

<div class="card">

    <h1>Link Expired</h1>
    <p>
        The password reset link you used is no longer valid or has expired.

    <a href="/auth/forgot-password" class="btn">
        Request New Link

    <div class="footer">
        If you didn’t request this, you can safely ignore it.
    </div>
</div>
