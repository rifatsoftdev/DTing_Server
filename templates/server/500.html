<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTing — Server Error</title>
    <link rel="icon" type="image/x-icon" href="/static/image/logo.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 1rem;
        }

        .error-wrapper {
            max-width: 480px;
            width: 100%;
        }

        .error-card {
            background: rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px rgba(31, 38, 135, 0.2);
            padding: 3rem 2rem;
            text-align: center;
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(25px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.45);
        }

        .icon-box i {
            color: #fff;
            font-size: 2rem;
        }

        .error-code {
            font-size: 3rem;
            font-weight: 800;
            color: #6366f1;
            margin-bottom: 0.5rem;
        }

        .error-message {
            font-size: 1.1rem;
            color: #374151;
            margin-bottom: 2rem;
        }

        .btn-home {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border: none;
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            font-weight: 600;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(99, 102, 241, 0.45);
            color: #fff;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #6b7280;
        }
    </style>
</head>

<body>
<div class="error-wrapper">
    <div class="error-card">
        <div class="icon-box">
            <i class="fas fa-bug"></i>
        </div>

        <div class="error-code">500</div>
        <div class="error-message">
            Oops! Something went wrong on our server.<br>
            Please try again later.
        </div>

        <a href="/" class="btn-home">Go to Home</a>

        <div class="footer">
            &copy; 2026 DTing. All rights reserved.
        </div>
    </div>
</div>
</body>
</html>
